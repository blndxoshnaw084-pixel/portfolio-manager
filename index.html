<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blnd Portfolio Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>

<header class="main-header text-center">
    <div class="container">
        <h1 class="fw-bold">Blnd Abdulla Hamad</h1>
        <p class="opacity-75">Portfolio Management System | PBL Project | Student Computer Education</p>
    </div>
</header>

<div class="container">
    <div class="row">
        <div class="col-lg-4 mb-4">
            <div class="card p-4 shadow-sm">
                <h4 class="mb-4 text-dark fw-bold border-bottom pb-2">New Entry</h4>
                <form id="projectForm">
                    <div class="mb-2"><label class="form-label fw-bold small">Project Title</label><input type="text" name="title" class="form-control form-control-sm" required></div>
                    <div class="mb-2"><label class="form-label fw-bold small">Owner Name</label><input type="text" name="owner_name" class="form-control form-control-sm" required></div>
                    <div class="row">
                        <div class="col-6 mb-2"><label class="form-label fw-bold small">Email</label><input type="email" name="owner_email" class="form-control form-control-sm" required></div>
                        <div class="col-6 mb-2"><label class="form-label fw-bold small">Phone</label><input type="text" name="owner_phone" class="form-control form-control-sm" required></div>
                    </div>
                    <div class="mb-2"><label class="form-label fw-bold small">Technology</label><input type="text" name="technology_used" class="form-control form-control-sm" required></div>
                    <div class="mb-3"><label class="form-label fw-bold small">Description</label><textarea name="description" class="form-control form-control-sm" rows="2" required></textarea></div>
                    <button type="submit" class="btn btn-primary w-100">Save Project</button>
                </form>
            </div>
        </div>
        <div class="col-lg-8">
            <h4 class="mb-4 text-dark fw-bold">Recent Projects Showcase</h4>
            <div class="row" id="projectsList"></div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>

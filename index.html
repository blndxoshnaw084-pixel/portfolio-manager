<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blnd Portfolio Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<header class="main-header text-center">
    <div class="container">
        <h1 class="fw-bold">Blnd Abdulla Hamad</h1>
        <p class="opacity-75">Computer Education Student | Portfolio Project</p>
    </div>
</header>

<div class="container">
    <div class="row">
        <div class="col-lg-4 mb-4">
            <div class="card p-4 shadow-sm">
                <h4 class="mb-4 text-dark fw-bold border-bottom pb-2">New Project</h4>
                <form id="projectForm">
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Project Title</label>
                        <input type="text" name="title" class="form-control" required placeholder="Enter title...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Technology</label>
                        <input type="text" name="technology_used" class="form-control" required placeholder="PHP, MySQL, etc.">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Description</label>
                        <textarea name="description" class="form-control" rows="3" required placeholder="Describe your work..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Add to List</button>
                </form>
            </div>
        </div>

        <div class="col-lg-8">
            <h4 class="mb-4 text-dark fw-bold">Project Showcase</h4>
            <div class="row" id="projectsList">
                </div>
        </div>
    </div>
</div>

<script>
    // کۆدی جاڤاسکڕێپتەکەت وەک خۆی لێرە دەبێت
    function loadProjects() {
        fetch('http://localhost/portfolio/get_projects.php')
        .then(response => response.json())
        .then(data => {
            let list = document.getElementById('projectsList');
            list.innerHTML = ''; 
            data.forEach(project => {
                list.innerHTML += `
                    <div class="col-md-6 mb-4">
                        <div class="card project-card shadow-sm p-3 h-100">
                            <h5 class="text-primary fw-bold">${project.title}</h5>
                            <div class="mb-3"><span class="badge-tech">${project.technology_used}</span></div>
                            <p class="small text-muted">${project.description}</p>
                        </div>
                    </div>
                `;
            });
        });
    }

    document.getElementById('projectForm').addEventListener('submit', function(e) {
        e.preventDefault(); 
        let formData = new FormData(this);
        fetch('http://localhost/portfolio/add_project.php', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if(data.status === 'success') {
                this.reset(); 
                loadProjects(); 
            }
        });
    });

    loadProjects();
</script>

</body>
</html>
